<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>TO DO LIST ONLINE</title>
    <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1 class="main-title">TO DO LIST</h1>
    
    <div class="input">
        <input id="inputTask" placeholder="Введіть задачу...">
        <button id="addButton">Додати</button>
        <button id="exampleButton">Побачити приклади задач</button>
    </div>

    <div class="card">
        <ul id="taskList"></ul>
        <div class="card-footer">
            <span id="taskCount">0 задач</span>
        </div>
    </div>

    <div id="overlay" class="hidden"></div>
    <div id="previewPanel" class="hidden">
        <ul id="previewList"></ul>
        <button id="addSelected">Додати вибране завдання</button>
    </div>

    <script src="bundle.js"></script>
</body>
</html>
